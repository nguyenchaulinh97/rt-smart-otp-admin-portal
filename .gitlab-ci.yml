stages:
  - build
  - deploy

variables:
  SERVICE_NAME: admin-portal
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""
  DOCKER_BUILDKIT: "1"

build:
  stage: build
  image: docker:26
  services:
    - name: docker:26-dind
      alias: docker
  script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - docker build --pull -t "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA" .
    - docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
    - |
      if [ "$CI_COMMIT_BRANCH" = "master" ]; then
        docker tag "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA" "$CI_REGISTRY_IMAGE:latest"
        docker push "$CI_REGISTRY_IMAGE:latest"
      fi
  only:
    - branches

deploy:
  stage: deploy
  image: docker:26
  services:
    - name: docker:26-dind
      alias: docker
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - ssh-keyscan -H $DEPLOY_HOST >> ~/.ssh/known_hosts
    - printf '%s\n' "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - docker pull $CI_REGISTRY_IMAGE:latest
    - docker tag $CI_REGISTRY_IMAGE:latest $SERVICE_NAME:latest
    - echo "Copying .env.production to home directory..."
    - scp .env.production $DEPLOY_USER@$DEPLOY_HOST:~/$SERVICE_NAME.env
    - echo "DEPLOY_USER=$DEPLOY_USER"
    - echo "DEPLOY_HOST=$DEPLOY_HOST"
    - docker save $SERVICE_NAME:latest | ssh $DEPLOY_USER@$DEPLOY_HOST docker load
    - ssh $DEPLOY_USER@$DEPLOY_HOST "bash /var/hackathon/toggle.sh $SERVICE_NAME 3000 ~/$SERVICE_NAME.env"
  only:
    - master
